name: "Setup — Dev Server"

on:
  workflow_dispatch:

jobs:
  setup:
    name: "Install Docker on Dev VM"
    runs-on: self-hosted

    steps:
      - name: Validate secrets and write deploy key
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.DEV_SSH_KEY_B64 }}" ]; then
            echo "ERROR: DEV_SSH_KEY_B64 is empty."
            exit 1
          fi

          if [ -z "${{ secrets.DEV_HOST }}" ]; then
            echo "ERROR: DEV_HOST is empty."
            exit 1
          fi

          if [ -z "${{ secrets.DEV_USER }}" ]; then
            echo "ERROR: DEV_USER is empty."
            exit 1
          fi

          echo "${{ secrets.DEV_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          echo "=== KEY SIZE ==="
          wc -c /tmp/deploy_key
          echo "=== VALIDATING KEY ==="
          ssh-keygen -l -f /tmp/deploy_key

      - name: Configure passwordless sudo
        run: |
          set -euo pipefail

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} \
            "set -e
            if sudo -n true 2>/dev/null; then
              echo '=== Passwordless sudo already configured — skipping ==='
            else
              echo '=== Configuring passwordless sudo ==='
              echo '${{ secrets.SUDO_PASS }}' | sudo -S bash -c \
                'echo \"${{ secrets.DEV_USER }} ALL=(ALL) NOPASSWD:ALL\" > /etc/sudoers.d/${{ secrets.DEV_USER }} && chmod 0440 /etc/sudoers.d/${{ secrets.DEV_USER }}'
              echo '=== Passwordless sudo configured ==='
            fi"

      - name: Install Docker on Dev VM
        run: |
          set -euo pipefail

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            echo "=== Docker not found — installing ==="
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker $(whoami)
            sudo mkdir -p /opt/app
            sudo chown $(whoami):$(whoami) /opt/app
            rm -f get-docker.sh
            echo "=== Docker installed successfully ==="
          else
            echo "=== Docker already present — skipping ==="
            sudo mkdir -p /opt/app
            sudo chown $(whoami):$(whoami) /opt/app
          fi
          EOF

      - name: Verify Docker
        run: |
          set -euo pipefail

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          set -e
          echo "=== Logged in as: $(whoami) ==="
          echo "=== Docker version ==="
          docker --version
          echo "=== Docker Compose version ==="
          docker compose version
          echo "=== Deployment directory ==="
          ls -la /opt/app
          echo "=== Dev server is ready for deployment ==="
          EOF

      - name: Cleanup key
        if: always()
        run: rm -f /tmp/deploy_key